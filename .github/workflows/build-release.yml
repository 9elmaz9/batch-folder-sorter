name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-15
            artifact_name: BatchFolderSorter-macos-arm64
            asset_path: dist/BatchFolderSorter-macos-arm64.zip
          - label: macOS x86_64
            runner: macos-15-intel
            artifact_name: BatchFolderSorter-macos-x86_64
            asset_path: dist/BatchFolderSorter-macos-x86_64.zip
          - label: Windows x64
            runner: windows-2022
            artifact_name: BatchFolderSorter-windows-x64
            asset_path: dist/BatchFolderSorter-windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: pyinstaller --clean --noconfirm BatchFolderSorter.spec

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --keepParent "dist/BatchFolderSorter.app" "${{ matrix.asset_path }}"

      - name: Build Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          pyinstaller --clean --noconfirm --windowed --name BatchFolderSorter
          --add-data "assets\LOGOLOGO.png;assets"
          --add-data "icon.png;."
          gui.py

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/BatchFolderSorter -DestinationPath ${{ matrix.asset_path }} -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_path }}

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List downloaded artifacts
        run: find release-artifacts -type f | sort

      - name: Generate checksums
        run: |
          find release-artifacts -name "*.zip" -type f -print0 | sort -z | xargs -0 sha256sum > release-artifacts/checksums.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t files < <(find release-artifacts -name "*.zip" -type f | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No zip artifacts were downloaded."
            exit 1
          fi

          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "Batch Folder Sorter ${GITHUB_REF_NAME}" \
              --notes "Cross-platform release for macOS arm64, macOS x86_64, and Windows x64."
          fi

          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" release-artifacts/checksums.txt --clobber
